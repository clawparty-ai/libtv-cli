name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive-name: libtv-cli-windows-x86_64
            binary-name: libtv-cli.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            archive-name: libtv-cli-macos-m1
            binary-name: libtv-cli
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: libtv-cli-linux-x86_64
            binary-name: libtv-cli
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: libtv-cli-linux-arm64
            binary-name: libtv-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p ${{ matrix.archive-name }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary-name }} ${{ matrix.archive-name }}/
          cp LICENSE ${{ matrix.archive-name }}/
          cp README.md ${{ matrix.archive-name }}/
          cp README.zh-CN.md ${{ matrix.archive-name }}/
          tar czf ${{ matrix.archive-name }}.tar.gz ${{ matrix.archive-name }}
          echo "ASSET=${{ matrix.archive-name }}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir ${{ matrix.archive-name }}
          Copy-Item target\${{ matrix.target }}\release\${{ matrix.binary-name }} ${{ matrix.archive-name }}\
          Copy-Item LICENSE ${{ matrix.archive-name }}\
          Copy-Item README.md ${{ matrix.archive-name }}\
          Copy-Item README.zh-CN.md ${{ matrix.archive-name }}\
          Compress-Archive -Path ${{ matrix.archive-name }} -DestinationPath ${{ matrix.archive-name }}.zip
          echo "ASSET=${{ matrix.archive-name }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: ${{ env.ASSET }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
